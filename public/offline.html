<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · Temuin</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0a0a0a;
        color: #f5f5f5;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        padding: 32px;
        border: 1px solid #272727;
        border-radius: 20px;
        background: #111;
      }
      .logo {
        width: 64px; height: 64px;
        margin: 0 auto 16px;
        border-radius: 16px;
        background: #dc2626;
        display: grid; place-items: center;
        font-weight: 800; font-size: 32px; color: #fff;
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #a1a1aa; line-height: 1.5; margin: 0 0 20px; }
      a {
        display: inline-block;
        background: #dc2626; color: #fff;
        text-decoration: none;
        padding: 10px 20px; border-radius: 12px; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">T</div>
      <h1>Kamu sedang offline</h1>
      <p>
        Barang hilang? Temuin aja. Halaman ini butuh koneksi internet. Coba cek
        jaringanmu dan muat ulang halaman.
      </p>
      <a href="/">Coba lagi</a>
    </div>
  </body>
</html>
